<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC CGL 2026 Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F0F4F8;
            --card-bg: #FFFFFF;
            --primary-text: #102A43;
            --secondary-text: #486581;
            --accent-main: #4361EE; 
            --accent-hot: #F72585; 
            --success-color: #06D6A0; 
            --border-radius: 14px;
            --border-color: #E2E8F0;
            --slot-bg: #F8FAFC;
            --gradient-start: #e2eafc;
        }

        [data-theme="dark"] {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --primary-text: #F8FAFC;
            --secondary-text: #94A3B8;
            --accent-main: #3B82F6; 
            --accent-hot: #F43F5E; 
            --success-color: #10B981; 
            --border-color: #334155;
            --slot-bg: #0F172A;
            --gradient-start: #1e293b;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, var(--gradient-start), transparent 400px);
            color: var(--primary-text);
            margin: 0;
            padding: 20px 20px 100px 20px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 2px solid var(--border-color); color: var(--primary-text); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700; transition: all 0.3s ease; }
        .theme-toggle:hover { border-color: var(--accent-main); }

        header { max-width: 1000px; margin: 0 auto 30px auto; text-align: center; position: relative; }
        h1 { font-weight: 700; font-size: 2.2rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        p.subtitle { color: var(--accent-hot); font-weight: 600; margin-top: 0; font-size: 1.1rem; }

        .dashboard-stats { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .stat-badge { background: var(--card-bg); padding: 10px 20px; border-radius: 20px; font-weight: 700; color: var(--accent-main); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid var(--border-color); }

        .progress-container { background-color: var(--border-color); border-radius: 20px; height: 24px; width: 100%; max-width: 600px; margin: 20px auto; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--accent-main), #8b5cf6); height: 100%; width: 0%; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: 700; }

        .chart-container { max-width: 1000px; margin: 0 auto 40px auto; background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-hot); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .week-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--accent-main); }
        .week-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; }
        .week-header h2 { margin: 0; font-size: 1.4rem; color: var(--accent-main); }
        .week-dates { font-size: 0.9rem; color: var(--secondary-text); font-weight: 700; background: var(--slot-bg); padding: 4px 10px; border-radius: 20px; }

        .mock-slot { display: flex; align-items: center; margin-bottom: 12px; padding: 12px; background-color: var(--slot-bg); border-radius: 10px; border: 1px solid var(--border-color); transition: all 0.3s; position: relative; }
        .mock-slot.locked { opacity: 0.85; background-color: rgba(226, 232, 240, 0.3); }

        /* Checkbox */
        .custom-checkbox { position: relative; display: inline-block; width: 24px; height: 24px; flex-shrink: 0; cursor: pointer; }
        .custom-checkbox.disabled { cursor: not-allowed; }
        .custom-checkbox input { opacity: 0; width: 0; height: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 24px; width: 24px; background-color: var(--card-bg); border: 2px solid var(--secondary-text); border-radius: 6px; transition: all 0.2s ease; }
        .custom-checkbox input:checked ~ .checkmark { background-color: var(--success-color); border-color: var(--success-color); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 7px; top: 3px; width: 6px; height: 12px; border: solid white; border-width: 0 3px 3px 0; transform: rotate(45deg); }
        .custom-checkbox input:checked ~ .checkmark:after { display: block; }
        
        .mock-info { flex-grow: 1; margin-left: 15px; }
        .mock-window { font-size: 0.75rem; color: var(--secondary-text); font-weight: 800; text-transform: uppercase; }
        .mock-target { font-size: 1.05rem; font-weight: 700; margin: 2px 0; color: var(--primary-text); }
        .mock-slot.locked .mock-target { text-decoration: line-through; color: var(--secondary-text); opacity: 0.7; }

        .score-input { width: 60px; padding: 8px; border: 2px solid var(--border-color); border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 0.95rem; color: var(--accent-main); text-align: center; background-color: var(--card-bg); }
        .score-input:disabled { background-color: transparent; color: var(--secondary-text); border-color: transparent; font-size: 1.1rem; }

        /* Admin Unlock Button */
        .unlock-btn { background: transparent; border: 1px solid var(--accent-hot); color: var(--accent-hot); border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; cursor: pointer; margin-left: 10px; font-weight: 700; font-family: inherit; transition: all 0.2s; }
        .unlock-btn:hover { background: var(--accent-hot); color: white; }

        .sunday-slot { background-color: rgba(244, 63, 94, 0.05); text-align: center; padding: 12px; border-radius: 10px; font-weight: 700; color: var(--accent-hot); margin-top: 15px; border: 2px dashed rgba(244, 63, 94, 0.3); }

        /* Draggable Floating Tracker */
        .floating-countdown { position: fixed; bottom: 30px; right: 30px; background: var(--card-bg); color: var(--primary-text); padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; text-align: right; border-left: 5px solid var(--accent-hot); cursor: grab; user-select: none; touch-action: none; }
        .floating-countdown:active { cursor: grabbing; }
        .countdown-label { font-size: 0.8rem; color: var(--secondary-text); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px; }
        .countdown-display { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--success-color); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); border: 1px solid var(--border-color); transform: translateY(20px); opacity: 0; transition: all 0.3s ease; }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: translateY(0); opacity: 1; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .modal-header h3 { margin: 0; color: var(--accent-main); font-size: 1.4rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--secondary-text); cursor: pointer; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--secondary-text); margin-bottom: 5px; }
        .input-group input[type="text"] { width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; background: var(--slot-bg); color: var(--primary-text); font-family: inherit; font-weight: 600; box-sizing: border-box; }
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .section-box { background: var(--slot-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .section-box h4 { margin: 0 0 10px 0; font-size: 0.95rem; color: var(--primary-text); }
        .rw-inputs { display: flex; gap: 10px; }
        .rw-inputs input { width: 100%; padding: 8px; border: 2px solid var(--border-color); border-radius: 6px; background: var(--card-bg); color: var(--primary-text); font-family: inherit; font-weight: 700; text-align: center; }
        .rw-inputs input::placeholder { font-weight: 500; color: var(--secondary-text); font-size: 0.8rem; }
        .rw-inputs input:focus { border-color: var(--accent-main); outline: none; }
        .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border-color); }
        .calc-score { font-size: 1.5rem; font-weight: 700; color: var(--success-color); }
        .save-btn { background: var(--accent-main); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .save-btn:hover { background: #2563eb; }
        .save-btn:disabled { background: var(--secondary-text); cursor: not-allowed; }

    </style>
</head>
<body>

        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>

    <header>
        <h1>SSC CGL 2026 Command Center</h1>
        <p class="subtitle">45 Past Papers • 15 Weeks • Maximum Output</p>
        
        <div class="dashboard-stats">
            <div class="stat-badge" id="avgScoreDisplay">Avg Score: 0.00</div>
            <div class="stat-badge" id="mocksCompletedDisplay">Mocks: 0 / 45</div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar">0%</div></div>
    </header>

    <div class="chart-container"><canvas id="scoreChart" height="80"></canvas></div>
    <div class="grid-container" id="scheduleGrid"></div>

    <div class="floating-countdown" id="draggableTimer">
        <div class="countdown-label" id="windowLabel">Loading...</div>
        <div class="countdown-display" id="windowCountdown">--:--:--</div>
    </div>

    <div class="modal-overlay" id="dataModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Analysis: Mock X</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="input-group">
                <label>Aspirant Name</label>
                <input type="text" id="aspirantName" placeholder="Enter your name (Saved locally)">
            </div>
            <div class="section-grid">
                <div class="section-box"><h4>Math (25 Qs)</h4><div class="rw-inputs"><input type="number" id="mathR" min="0" max="25" placeholder="Right" onkeyup="calcModalScore()" onchange="calcModalScore()"><input type="number" id="mathW" min="0" max="25" placeholder="Wrong" onkeyup="calcModalScore()" onchange="calcModalScore()"></div></div>
                <div class="section-box"><h4>Reasoning (25 Qs)</h4><div class="rw-inputs"><input type="number" id="reasR" min="0" max="25" placeholder="Right" onkeyup="calcModalScore()" onchange="calcModalScore()"><input type="number" id="reasW" min="0" max="25" placeholder="Wrong" onkeyup="calcModalScore()" onchange="calcModalScore()"></div></div>
                <div class="section-box"><h4>English (25 Qs)</h4><div class="rw-inputs"><input type="number" id="engR" min="0" max="25" placeholder="Right" onkeyup="calcModalScore()" onchange="calcModalScore()"><input type="number" id="engW" min="0" max="25" placeholder="Wrong" onkeyup="calcModalScore()" onchange="calcModalScore()"></div></div>
                <div class="section-box"><h4>General Aware. (25 Qs)</h4><div class="rw-inputs"><input type="number" id="gkR" min="0" max="25" placeholder="Right" onkeyup="calcModalScore()" onchange="calcModalScore()"><input type="number" id="gkW" min="0" max="25" placeholder="Wrong" onkeyup="calcModalScore()" onchange="calcModalScore()"></div></div>
            </div>
            <div class="modal-footer">
                <div class="calc-score">Score: <span id="modalFinalScore">0.00</span></div>
                <button class="save-btn" onclick="saveModalData()">Sync & Save</button>
            </div>
        </div>
    </div>

        <script>
        // --- THE MASTER SETTINGS ---
        const ADMIN_PIN = "2026"; // Change this to whatever you want your secret code to be
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbxAE7sF03Gkh_X8xoPW7jApyejMueDIf0m2Hr6gTyhnNzCWRvqKEnzaQjxs5gyPfGxrsw/exec";
        const startDate = new Date(2026, 2, 9); 
        
        // Wipe out old random local lists so everyone aligns
        localStorage.removeItem('shuffledShifts');
        
        // The universally synced master schedule
        const allShifts = [
            "Sept 18, Shift 2", "Sept 12, Shift 3", "Sept 24, Shift 1", "Sept 15, Shift 1", "Sept 21, Shift 2", "Sept 26, Shift 3",
            "Sept 13, Shift 2", "Sept 19, Shift 1", "Sept 22, Shift 3", "Sept 14, Shift 1", "Sept 20, Shift 2", "Sept 25, Shift 3",
            "Sept 16, Shift 2", "Sept 17, Shift 3", "Sept 23, Shift 1", "Sept 12, Shift 1", "Sept 18, Shift 3", "Sept 24, Shift 2",
            "Sept 15, Shift 2", "Sept 21, Shift 3", "Sept 26, Shift 1", "Sept 13, Shift 3", "Sept 19, Shift 2", "Sept 22, Shift 1",
            "Sept 14, Shift 2", "Sept 20, Shift 3", "Sept 25, Shift 1", "Sept 16, Shift 3", "Sept 17, Shift 1", "Sept 23, Shift 2",
            "Sept 12, Shift 2", "Sept 18, Shift 1", "Sept 24, Shift 3", "Sept 15, Shift 3", "Sept 21, Shift 1", "Sept 26, Shift 2",
            "Sept 13, Shift 1", "Sept 19, Shift 3", "Sept 22, Shift 2", "Sept 14, Shift 3", "Sept 20, Shift 1", "Sept 25, Shift 2",
            "Sept 16, Shift 1", "Sept 17, Shift 2", "Sept 23, Shift 3"
        ];

        // --- THEME LOGIC ---
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark'); btn.innerText = "☀️ Light Mode"; localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light'); btn.innerText = "🌙 Dark Mode"; localStorage.setItem('theme', 'light');
            }
            updateAnalytics(); 
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').innerText = "☀️ Light Mode";
        }

        // --- DYNAMIC GRID RENDERER ---
        function formatDateRange(startDateStr, daysToAdd) {
            let d1 = new Date(startDateStr); let d2 = new Date(startDateStr); d2.setDate(d1.getDate() + daysToAdd);
            return `${d1.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${d2.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
        }

        function renderGrid() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = ''; // Clear existing grid
            let shiftIndex = 0;

            for (let week = 1; week <= 15; week++) {
                let currentWeekStart = new Date(startDate);
                currentWeekStart.setDate(startDate.getDate() + ((week - 1) * 7));
                
                const card = document.createElement('div');
                card.className = 'week-card';
                let html = `<div class="week-header"><h2>Week ${week}</h2><span class="week-dates">${formatDateRange(currentWeekStart, 6)}</span></div>`;

                const windows = ["Window A (Mon-Tue)", "Window B (Wed-Thu)", "Window C (Fri-Sat)"];

                windows.forEach((win) => {
                    const shiftTarget = allShifts[shiftIndex];
                    const checkboxId = `mock-${shiftIndex}`;
                    const scoreId = `score-${shiftIndex}`;
                    
                    const isChecked = localStorage.getItem(checkboxId) === 'true';
                    const savedScore = localStorage.getItem(scoreId) || '';
                    
                    // The Lock/Unlock State Logic
                    if (isChecked) {
                        html += `
                            <div class="mock-slot locked">
                                <label class="custom-checkbox disabled">
                                    <input type="checkbox" checked disabled>
                                    <span class="checkmark"></span>
                                </label>
                                <div class="mock-info">
                                    <div class="mock-window">${win}</div>
                                    <div class="mock-target">${shiftTarget}</div>
                                </div>
                                <input type="text" class="score-input" value="${savedScore}" disabled>
                                <button class="unlock-btn" onclick="requestUnlock(${shiftIndex}, '${shiftTarget}')">🔒 Edit</button>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="mock-slot">
                                <label class="custom-checkbox">
                                    <input type="checkbox" id="${checkboxId}" onclick="openModal(${shiftIndex}, '${shiftTarget}', event)">
                                    <span class="checkmark"></span>
                                </label>
                                <div class="mock-info">
                                    <div class="mock-window">${win}</div>
                                    <div class="mock-target">${shiftTarget}</div>
                                </div>
                                <input type="text" class="score-input" id="${scoreId}" placeholder="Score" value="" disabled>
                            </div>
                        `;
                    }
                    shiftIndex++;
                });

                html += `<div class="sunday-slot">Sunday: Deep Analysis & Recovery</div>`;
                card.innerHTML = html;
                grid.appendChild(card);
            }
        }

        // --- MODAL & SECURITY LOGIC ---
        let currentActiveMockId = null;

        function openModal(index, targetName, event) {
            if(event) event.preventDefault(); // Stop checkbox from checking visually before save
            currentActiveMockId = index;
            document.getElementById('modalTitle').innerText = `Analysis: ${targetName}`;
            
            if(localStorage.getItem('aspirantName')) {
                document.getElementById('aspirantName').value = localStorage.getItem('aspirantName');
            }

            // Pre-fill if editing, otherwise blank
            const existingData = localStorage.getItem(`details-${index}`);
            if(existingData) {
                const p = JSON.parse(existingData);
                document.getElementById('mathR').value = p.math.r; document.getElementById('mathW').value = p.math.w;
                document.getElementById('reasR').value = p.reas.r; document.getElementById('reasW').value = p.reas.w;
                document.getElementById('engR').value = p.eng.r; document.getElementById('engW').value = p.eng.w;
                document.getElementById('gkR').value = p.gk.r; document.getElementById('gkW').value = p.gk.w;
            } else {
                ['mathR', 'mathW', 'reasR', 'reasW', 'engR', 'engW', 'gkR', 'gkW'].forEach(id => document.getElementById(id).value = '');
            }
            
            calcModalScore();
            document.getElementById('dataModal').classList.add('active');
        }

        function requestUnlock(index, targetName) {
            const pin = prompt("🔒 This record is locked to prevent tampering. \n\nEnter Admin PIN to unlock:");
            if (pin === null) return; // User hit cancel
            
            if (pin === ADMIN_PIN) {
                alert("✅ Access Granted. You may update your score.");
                openModal(index, targetName, null);
            } else {
                alert("❌ Incorrect PIN. Access Denied.");
            }
        }

        function closeModal() {
            document.getElementById('dataModal').classList.remove('active');
            currentActiveMockId = null;
        }

        function calcModalScore() {
            let totalRight = 0; let totalWrong = 0;
            ['math', 'reas', 'eng', 'gk'].forEach(sec => {
                let r = parseInt(document.getElementById(`${sec}R`).value) || 0;
                let w = parseInt(document.getElementById(`${sec}W`).value) || 0;
                if (r + w > 25) { w = 25 - r; document.getElementById(`${sec}W`).value = w; }
                totalRight += r; totalWrong += w;
            });

            let finalScore = (totalRight * 2) - (totalWrong * 0.5);
            if (finalScore < 0) finalScore = 0;
            
            document.getElementById('modalFinalScore').innerText = finalScore.toFixed(2);
            return { score: finalScore.toFixed(2), totalRight, totalWrong };
        }

        function saveModalData() {
            if (currentActiveMockId === null) return;
            
            const name = document.getElementById('aspirantName').value.trim();
            if(!name) { alert("Please enter your name."); return; }
            localStorage.setItem('aspirantName', name);

            const result = calcModalScore();
            const index = currentActiveMockId;
            const checkboxId = `mock-${index}`;
            const scoreId = `score-${index}`;

            const dataPacket = {
                name: name, mockIndex: index, mockName: allShifts[index],
                math: { r: document.getElementById('mathR').value || 0, w: document.getElementById('mathW').value || 0 },
                reas: { r: document.getElementById('reasR').value || 0, w: document.getElementById('reasW').value || 0 },
                eng: { r: document.getElementById('engR').value || 0, w: document.getElementById('engW').value || 0 },
                gk: { r: document.getElementById('gkR').value || 0, w: document.getElementById('gkW').value || 0 },
                finalScore: result.score
            };

            // Save locally
            localStorage.setItem(checkboxId, 'true');
            localStorage.setItem(scoreId, result.score);
            localStorage.setItem(`details-${index}`, JSON.stringify(dataPacket));

            const saveBtn = document.querySelector('.save-btn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "Syncing..."; saveBtn.disabled = true;

            fetch(GOOGLE_SHEETS_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPacket)
            }).then(() => {
                saveBtn.innerText = originalText; saveBtn.disabled = false;
                alert("Score successfully locked and synced to the database!");
                closeModal(); renderGrid(); updateAnalytics(); // Redraw grid to show Lock
            }).catch(error => {
                console.error('Error sending data:', error);
                saveBtn.innerText = originalText; saveBtn.disabled = false;
                alert("Data saved locally, but error syncing to the cloud.");
                closeModal(); renderGrid(); updateAnalytics();
            });
        }

                    // --- CHART & ANALYTICS ---
        let scoreChartInstance = null;
        function updateAnalytics() {
            let completed = 0; let totalScore = 0; let scoredMocksCount = 0;
            let chartLabels = []; let chartData = [];

            for(let i = 0; i < 45; i++) {
                if(localStorage.getItem(`mock-${i}`) === 'true') {
                    completed++;
                    let score = localStorage.getItem(`score-${i}`);
                    if(score && score.trim() !== '') {
                        totalScore += parseFloat(score); scoredMocksCount++;
                        chartLabels.push(`Mock ${i+1}`); chartData.push(parseFloat(score));
                    }
                }
            }

            const percentage = Math.round((completed / 45) * 100);
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressBar').innerText = completed > 0 ? percentage + '%' : '';
            document.getElementById('mocksCompletedDisplay').innerText = `Mocks: ${completed} / 45`;

            const avg = scoredMocksCount > 0 ? (totalScore / scoredMocksCount).toFixed(2) : "0.00";
            document.getElementById('avgScoreDisplay').innerText = `Avg Score: ${avg}`;

            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if(scoreChartInstance) scoreChartInstance.destroy();

            scoreChartInstance = new Chart(ctx, {
                type: 'line', data: { labels: chartLabels, datasets: [{ label: 'Mock Scores', data: chartData, borderColor: '#F72585', backgroundColor: 'rgba(247, 37, 133, 0.1)', borderWidth: 3, pointBackgroundColor: '#3B82F6', pointBorderColor: '#fff', pointRadius: 5, fill: true, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 200, grid: { color: isDark ? '#334155' : '#E2E8F0' }, ticks: { color: isDark ? '#94A3B8' : '#486581' } }, x: { grid: { display: false }, ticks: { color: isDark ? '#94A3B8' : '#486581' } } } }
            });
        }

        // --- TIMER & DRAGGABLE LOGIC ---
        function updateWindowTracker() {
            const now = new Date(); const dayOfWeek = now.getDay(); 
            let windowName = ""; let endTime = new Date(now); endTime.setHours(23, 59, 59, 999);

            if (dayOfWeek === 1 || dayOfWeek === 2) { windowName = "Closes: Window A (Mon-Tue)"; if (dayOfWeek === 1) endTime.setDate(now.getDate() + 1);
            } else if (dayOfWeek === 3 || dayOfWeek === 4) { windowName = "Closes: Window B (Wed-Thu)"; if (dayOfWeek === 3) endTime.setDate(now.getDate() + 1);
            } else if (dayOfWeek === 5 || dayOfWeek === 6) { windowName = "Closes: Window C (Fri-Sat)"; if (dayOfWeek === 5) endTime.setDate(now.getDate() + 1);
            } else if (dayOfWeek === 0) { windowName = "Next Window Opens In:"; }

            const diff = endTime.getTime() - now.getTime();
            const totalH = Math.floor(diff / (1000 * 60 * 60)); const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('windowLabel').innerText = windowName;
            document.getElementById('windowCountdown').innerText = `${totalH.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
        }

        const dragItem = document.getElementById("draggableTimer");
        let active = false; let currentX, currentY, initialX, initialY; let xOffset = 0, yOffset = 0;
        dragItem.addEventListener("mousedown", dragStart, false); document.addEventListener("mouseup", dragEnd, false); document.addEventListener("mousemove", drag, false);
        dragItem.addEventListener("touchstart", dragStart, {passive: false}); document.addEventListener("touchend", dragEnd, false); document.addEventListener("touchmove", drag, {passive: false});

        function dragStart(e) {
            if (e.type === "touchstart") { initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; } 
            else { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; }
            if (e.target === dragItem || dragItem.contains(e.target)) { active = true; }
        }
        function dragEnd(e) { initialX = currentX; initialY = currentY; active = false; }
        function drag(e) {
            if (active) {
                e.preventDefault();
                if (e.type === "touchmove") { currentX = e.touches[0].clientX - initialX; currentY = e.touches[0].clientY - initialY; } 
                else { currentX = e.clientX - initialX; currentY = e.clientY - initialY; }
                xOffset = currentX; yOffset = currentY; setTranslate(currentX, currentY, dragItem);
            }
        }
        function setTranslate(xPos, yPos, el) { el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`; }

        // --- INIT ---
        renderGrid();
        setInterval(updateWindowTracker, 1000); updateWindowTracker(); updateAnalytics();

    </script>
</body>
